<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" fill="#1B2845" rx="8"/>
  
  <!-- Subtle grain overlay -->
  <rect width="64" height="64" fill="url(#grain)" opacity="0.03"/>
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
    </filter>
  </defs>
  
  <!-- Accent circle (subtle) -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#D4A574" stroke-width="0.5" opacity="0.15"/>
  
  <!-- 7777 Text -->
  <text 
    x="32" 
    y="42" 
    font-family="'Playfair Display', serif" 
    font-size="28" 
    font-weight="700" 
    fill="#D4A574" 
    text-anchor="middle"
    letter-spacing="-1">7777</text>
</svg>
