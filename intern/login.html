<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · mindful7777 Intern</title>
<style>
:root{--bg:#0d0d0d;--border:#2a2a2a;--muted:#888;--accent:#c8a96e;--white:#fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--white);font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.box{width:100%;max-width:380px;padding:48px 40px;border:1px solid var(--border);}
.brand{font-size:13px;letter-spacing:0.15em;color:var(--accent);margin-bottom:32px;}
h1{font-size:24px;font-weight:400;margin-bottom:8px;}
.sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
input{width:100%;background:#111;border:1px solid var(--border);color:var(--white);padding:14px 16px;font-family:Georgia,serif;font-size:15px;margin-bottom:16px;outline:none;}
input:focus{border-color:var(--accent);}
button{width:100%;background:var(--accent);color:#0d0d0d;border:none;padding:14px;font-family:Georgia,serif;font-size:14px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;}
button:hover{opacity:0.9;}
.err{color:#e57373;font-size:13px;margin-top:12px;display:none;}
.back{margin-top:24px;text-align:center;}
.back a{color:var(--muted);font-size:12px;text-decoration:none;letter-spacing:0.08em;}
.back a:hover{color:var(--accent);}
</style>
</head>
<body>
<div class="box">
  <div class="brand">mindful7777 · intern</div>
  <h1>Zugang</h1>
  <p class="sub">Passwort eingeben um fortzufahren.</p>
  <input type="password" id="pw" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin(this.value)">
  <button onclick="doLogin(document.getElementById('pw').value)">Einloggen →</button>
  <div class="err" id="err">Falsches Passwort.</div>
  <div class="back"><a href="/">← Zurück zur Website</a></div>
</div>
<script src="auth.js"></script>
</body>
</html>
