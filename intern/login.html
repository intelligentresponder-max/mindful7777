<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interner Bereich · mindful7777</title>
  <style>
    :root { --primary: #0A0A0A; --accent: #1F5C99; --white: #FFFFFF; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--primary); color: var(--white);
      font-family: Arial, sans-serif; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
    }
    .logo { font-size: 1.4rem; letter-spacing: 0.1em; margin-bottom: 2.5rem; color: var(--accent); }
    .card {
      background: #141414; border: 1px solid #222; border-radius: 12px;
      padding: 2.5rem 2rem; width: 100%; max-width: 380px; text-align: center;
    }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
    p.sub { font-size: 0.85rem; color: #888; margin-bottom: 2rem; }
    input[type="password"] {
      width: 100%; padding: 0.85rem 1rem; background: #0A0A0A;
      border: 1px solid #333; border-radius: 8px; color: var(--white);
      font-size: 1rem; margin-bottom: 1rem; outline: none;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    button.login {
      width: 100%; padding: 0.85rem; background: var(--accent); color: var(--white);
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600;
    }
    button.login:hover { background: #174a80; }
    .error { display: none; color: #e05252; font-size: 0.82rem; margin-top: 0.75rem; }
    .back { margin-top: 1.5rem; font-size: 0.82rem; }
    .back a { color: #555; text-decoration: none; }
    .back a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="logo">mindful7777</div>
  <div class="card">
    <h1>🔒 Interner Bereich</h1>
    <p class="sub">Nur für autorisierte Personen</p>
    <input type="password" id="pw" placeholder="Passwort eingeben"
           onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login" onclick="doLogin()">Zugang öffnen</button>
    <div class="error" id="err">Passwort ungültig. Fragen: hello@mindful7777.de</div>
  </div>
  <div class="back"><a href="/">← Zurück zur Startseite</a></div>
  <script>
    var INTERN = {
      'intern2025': { name: 'Intern', access: ['alle'] },
      'andretest7': { name: 'Admin',  access: ['alle'] }
    };
    function doLogin() {
      var pw = document.getElementById('pw').value.trim();
      if (INTERN[pw]) {
        localStorage.setItem('m7_intern', JSON.stringify(INTERN[pw]));
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }
  </script>
</body>
</html>
